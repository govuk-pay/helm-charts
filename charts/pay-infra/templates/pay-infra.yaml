apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pay-infra
  namespace: pay-infra
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: pay-infra
  syncPolicy:
    automated:
      enabled: true
      prune: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  sources:
  - repoURL: https://github.com/govuk-pay/helm-charts.git
    path: charts/pay-infra
  destination:
    server: "https://kubernetes.default.svc"
    namespace: pay-infra
