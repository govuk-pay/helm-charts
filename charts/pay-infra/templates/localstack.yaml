apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localstack
  namespace: pay-infra
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: pay-infra
  syncPolicy:
    automated:
      enabled: true
      prune: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  sources:
  - repoURL: https://localstack.github.io/helm-charts
    targetRevision: {{ .Values.localstack.version }}
    chart: argo-cd
    helm:
      valueFiles:
      - $repo/values/pay-infra/localstack/values.yaml
  - repoURL: 'https://github.com/govuk-pay/helm-charts.git'
    ref: repo
  destination:
    server: "https://kubernetes.default.svc"
    namespace: localstack
