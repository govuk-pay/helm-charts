apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
spec:
  project: default
  source:
      repoURL: https://charts.crossplane.io/stable
      targetRevision: 2.2.0
      chart: crossplane
  destination:
    server: "https://kubernetes.default.svc"
    namespace: crossplane
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
