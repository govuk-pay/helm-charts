apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pay-infra-common
  namespace: argocd
spec:
  project: default
  source:
      repoURL: https://github.com/govuk-pay/helm-charts.git
      targetRevision: HEAD
      path: pay-infra-common
  destination:
    server: "https://kubernetes.default.svc"
    namespace: pay-infra
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
