apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pay-infra
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters: {}
  template:
    metadata:
      name: 'pay-infra-{{`{{ .name }}`}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/govuk-pay/helm-charts.git
        targetRevision: HEAD
        path: pay-infra
        helm:
          valuesObject:
            environment: '{{`{{ .name }}`}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          enabled: true
        syncOptions:
        - CreateNamespace=true
