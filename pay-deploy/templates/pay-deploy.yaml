apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pay-deploy
  namespace: argocd
spec:
  project: default
  source:
      repoURL: https://github.com/govuk-pay/helm-charts.git
      targetRevision: HEAD
      path: pay-deploy
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
    - CreateNamespace=true
