apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pay-app.fullname" . }}
  labels:
    {{- include "pay-app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "pay-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pay-app.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pay-app.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- if .Values.command }}
          command:
            {{  range .Values.command }}
            - {{ . }}
            {{ end }}
          {{- end }}
          {{- if .Values.args }}
          args:
            {{ range .Values.args }}
            - {{ . }}
            {{ end }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
          {{- range $key, $val := .Values.env }}
          - name: {{ $key }}
            value: {{ $val | quote }}
          {{- end }}
          - name: USE_SYSTEM_CA_CERTS
            value: '1'
          {{- if .Values.deployDatabase }}
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: {{ include "pay-app.fullname" . }}-db-app
                key: host
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                  name: {{ include "pay-app.fullname" . }}-db-app
                  key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "pay-app.fullname" . }}-db-app
                key: password
          - name: DB_SSL_OPTION
            value: ssl=false&sslmode=disable
          {{- end }}
          {{- if .Values.useLocalstack }}
          - name: AWS_SQS_REGION
            value: eu-west-1
          - name: AWS_SQS_MESSAGE_MAXIMUM_WAIT_TIME_IN_SECONDS
            value: '20'
          - name: AWS_SQS_NON_STANDARD_SERVICE_ENDPOINT
            value: 'true'
          - name: AWS_SQS_ENDPOINT
            value: 'http://localstack.localstack.svc.cluster.local:4566'
          - name: AWS_SNS_NON_STANDARD_SERVICE_ENDPOINT
            value: 'true'
          - name: AWS_SNS_ENDPOINT
            value: 'http://localstack.localstack.svc.cluster.local:4566'
          {{- end }}
          {{- if .Values.useCrossplane }}
          - name: AWS_SQS_CONNECTOR_TASKS_QUEUE_URL
            valueFrom:
              secretKeyRef:
                name: connector-tasks-queue
                key: url
          - name: AWS_SQS_CAPTURE_QUEUE_URL
            valueFrom:
              secretKeyRef:
                name: pay-capture-queue
                key: url
          - name: AWS_SQS_PAYMENT_EVENT_QUEUE_URL
            valueFrom:
              secretKeyRef:
                name: pay-event-queue
                key: url
          - name: AWS_SQS_PAYOUT_RECONCILE_QUEUE_URL
            valueFrom:
              secretKeyRef:
                name: payout-reconcile-queue
                key: url
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
